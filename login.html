<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login | Unlimited Topup</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css?v=20260609-rootimages"></head><body><main class="auth-page"><section class="auth-panel"><a class="brand" href="index.html"><span class="brand-mark">UT</span><span class="brand-text"><strong>Unlimited Topup</strong><span>Firebase login</span></span></a><h1>Login</h1><p class="subtitle">Sign in with your Firebase email and password account.</p><form class="auth-form" id="loginForm"><label>Gmail ID<input id="gmail" type="email" autocomplete="email" placeholder="name@gmail.com" required></label><label>Password<input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required></label><div class="error-msg" id="error"></div><button class="btn primary full" type="submit" id="loginBtn">Login</button></form><div class="auth-footer"><a href="forgot-password.html">Forgot password?</a> | <a href="signup.html">Create account</a> | <a href="index.html">Home</a></div><p class="notice" id="loggedInNotice" style="display:none;margin-top:16px;"></p></section></main><script type="module">import { authReady, auth, loginAccount, logoutAccount, gmailValid, showLoading, hideLoading } from './site.js?v=20260609-rootimages'; const notice=document.getElementById('loggedInNotice'); await authReady; if(auth.currentUser){notice.style.display='block'; notice.innerHTML='Already signed in as <strong>'+auth.currentUser.email+'</strong>. <button class="btn ghost" id="signOutBtn" type="button">Sign Out</button>';} document.getElementById('signOutBtn')?.addEventListener('click', async()=>{await logoutAccount(); location.reload();}); const form=document.getElementById('loginForm'), error=document.getElementById('error'), btn=document.getElementById('loginBtn'); form.addEventListener('submit', async (e)=>{e.preventDefault(); error.textContent=''; const email=document.getElementById('gmail').value.trim(); const password=document.getElementById('password').value; if(!gmailValid(email)){error.textContent='Please enter a valid Gmail address.'; return;} btn.disabled=true; btn.textContent='Logging in...'; showLoading('Logging in...'); const result=await loginAccount(email,password); if(!result.ok){hideLoading(); error.textContent=result.message; btn.disabled=false; btn.textContent='Login'; return;} showLoading('Opening your profile...'); window.location.href='index.html';});</script></body></html>
